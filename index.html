<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1"
    />
    <title>Mem Master</title>
  </head>
  <body>
    <main>
      <!-- Move UI outside the 3D container so it always works -->
      <div id="ui-layer">
        <div id="turn-indicator"></div>
        <button id="help-btn">?</button>
        <div id="status-toast"></div>
      </div>

      <div id="game-container">
        <div id="table-surface"></div>
        
        <!-- Full screen rings for proper spacing -->
        <div id="guess-cards-ring"></div>
        <div id="players-ring"></div>

        <!-- Center Deck -->
        <div id="deck-stack">
          <div class="deck-top">🎴</div>
        </div>

        <div id="drawn-reveal-container"></div>
      </div>

      <!-- Overlays -->
      <div id="help-overlay" class="hidden">
        <div class="help-modal">
          <h2>How to Play</h2>
          <p><strong>1. Draw:</strong> Click the center deck to reveal a target emoji.</p>
          <p><strong>2. Guess:</strong> Find that emoji! It could be in the <strong>Center Circle</strong> or in a <strong>Player's Hand</strong>.</p>
          <p><strong>3. Steal:</strong> Guess correctly to take the card!</p>
          <p><strong>4. Risk:</strong> Wrong guesses return the card to the center.</p>
          <button id="close-help">Got it!</button>
        </div>
      </div>
    </main>
    <script type="module" src="/src/logic.ts"></script>
    <script type="module" src="/src/client.ts"></script>
    <script>
      (function() {
        const setupInterceptor = (doc) => {
          if (doc.__octaStarInterceptorSet) return;
          doc.__octaStarInterceptorSet = true;

          doc.addEventListener('click', function(event) {
            const icon = event.target.closest('img[src*="M13.4099%2012L17.7099"]');
            if (icon) {
              const confirmed = confirm("Are you sure you want to close this?");
              if (!confirmed) {
                event.stopImmediatePropagation();
                event.preventDefault();
              }
            }
          }, { capture: true });
        };
        setupInterceptor(document);
      })();
    </script>
  </body>
</html>
